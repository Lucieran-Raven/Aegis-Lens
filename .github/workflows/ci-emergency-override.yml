name: CI/CD Pipeline (Emergency Override - Ubuntu 20.04)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Environment validation
        run: bash .github/scripts/env_check.sh

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.21
          cache: true

      - name: Run go vet
        working-directory: ./aegis-backend
        run: go vet ./...

      - name: Run tests
        working-directory: ./aegis-backend
        run: go test -v ./...

      - name: Run race detector
        working-directory: ./aegis-backend
        run: go test -race ./...

  sdk:
    name: SDK (TypeScript)
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Environment validation
        run: bash .github/scripts/env_check.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: aegis-sdk/package-lock.json

      - name: Install dependencies
        working-directory: ./aegis-sdk
        run: npm ci --prefer-offline --no-audit

      - name: Run linter
        working-directory: ./aegis-sdk
        run: npm run lint

      - name: Type check
        working-directory: ./aegis-sdk
        run: npm run type-check

      - name: Run tests
        working-directory: ./aegis-sdk
        run: npm test

      - name: Security audit
        working-directory: ./aegis-sdk
        run: npm audit --audit-level=moderate || true

  rust-wasm:
    name: Rust WASM
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Environment validation
        run: bash .github/scripts/env_check.sh

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
        env:
          CARGO_HOME: /root/.cargo

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Check WASM build
        working-directory: ./aegis-sdk/src-rust
        run: cargo check --target wasm32-unknown-unknown

  docker:
    name: Docker Build
    runs-on: ubuntu-20.04
    needs: [backend, sdk, rust-wasm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build backend image
        working-directory: ./aegis-backend
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache,mode=max \
            --load \
            -t aegis-backend:latest .

      - name: Build SDK image
        working-directory: ./aegis-sdk
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache,mode=max \
            --load \
            -t aegis-sdk:latest .
