name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
      
      - name: Run go vet
        working-directory: ./aegis-backend
        run: go vet ./...
      
      - name: Run tests
        working-directory: ./aegis-backend
        run: go test -v -race -coverprofile=coverage.out ./...
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./aegis-backend/coverage.out
          flags: backend
          name: backend-coverage

  sdk:
    name: SDK (TypeScript)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./aegis-sdk/package-lock.json
      
      - name: Install dependencies
        working-directory: ./aegis-sdk
        run: npm ci
      
      - name: Run linter
        working-directory: ./aegis-sdk
        run: npm run lint
      
      - name: Run type check
        working-directory: ./aegis-sdk
        run: npm run typecheck
      
      - name: Run tests
        working-directory: ./aegis-sdk
        run: npm test -- --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./aegis-sdk/coverage/lcov.info
          flags: sdk
          name: sdk-coverage

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, sdk]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build backend Docker image
        run: |
          docker build -t aegis-backend:test ./aegis-backend --target production
      
      - name: Build SDK Docker image
        run: |
          docker build -t aegis-sdk:test ./aegis-sdk --target production
