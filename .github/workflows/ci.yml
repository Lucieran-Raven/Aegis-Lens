name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Environment validation
        run: bash .github/scripts/env_check.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run go vet
        working-directory: ./aegis-backend
        run: go vet ./...

      - name: Run tests
        working-directory: ./aegis-backend
        run: go test -v ./...

      - name: Run race detector
        working-directory: ./aegis-backend
        run: go test -race ./...

  sdk:
    name: SDK (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Environment validation
        run: bash .github/scripts/env_check.sh
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./aegis-sdk/package-lock.json
      
      - name: Install dependencies
        working-directory: ./aegis-sdk
        run: npm ci --prefer-offline --no-audit

      - name: Security audit
        working-directory: ./aegis-sdk
        run: npm audit --audit-level=moderate || true
      
      - name: Run linter
        working-directory: ./aegis-sdk
        run: npm run lint
      
      - name: Run type check
        working-directory: ./aegis-sdk
        run: npm run typecheck
      
      - name: Run tests
        working-directory: ./aegis-sdk
        run: npm test -- --passWithNoTests chirp-generator.test.ts glint-detector.test.ts

  rust:
    name: Rust WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Environment validation
        run: bash .github/scripts/env_check.sh

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install wasm-bindgen-test-runner
        run: |
          cargo install wasm-bindgen-test-runner

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Run cargo check
        working-directory: ./aegis-sdk/src-rust
        run: cargo check --target wasm32-unknown-unknown

      - name: Run cargo test
        working-directory: ./aegis-sdk/src-rust
        run: cargo test

      - name: Build WASM
        working-directory: ./aegis-sdk/src-rust
        run: wasm-pack build --target web --release

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, sdk, rust]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build backend Docker image
        run: |
          docker build -t aegis-backend:test ./aegis-backend --target production --cache-from type=local,src=/tmp/.buildx-cache --cache-to type=local,dest=/tmp/.buildx-cache-new

      - name: Build SDK Docker image
        run: |
          docker build -t aegis-sdk:test ./aegis-sdk --target production --cache-from type=local,src=/tmp/.buildx-cache --cache-to type=local,dest=/tmp/.buildx-cache-new

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
